name: Deploy

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  # ── Run CI first ─────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -q --tb=short

  # ── Deploy API ───────────────────────────────────────────────
  deploy-api:
    name: Deploy API to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          TAG=${GITHUB_REF_NAME}
          docker build -t asia-southeast1-docker.pkg.dev/terrene-care/praxis/praxis-api:${TAG} .
          docker push asia-southeast1-docker.pkg.dev/terrene-care/praxis/praxis-api:${TAG}

      - name: Deploy to Cloud Run
        run: |
          TAG=${GITHUB_REF_NAME}
          gcloud run services update praxis-api \
            --image=asia-southeast1-docker.pkg.dev/terrene-care/praxis/praxis-api:${TAG} \
            --project=terrene-care \
            --region=asia-southeast1

  # ── Deploy Web ───────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and push
        working-directory: apps/web
        run: |
          TAG=${GITHUB_REF_NAME}
          docker build \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} \
            --build-arg VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }} \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }} \
            -t asia-southeast1-docker.pkg.dev/terrene-care/praxis/praxis-web:${TAG} .
          docker push asia-southeast1-docker.pkg.dev/terrene-care/praxis/praxis-web:${TAG}

      - name: Deploy to Cloud Run
        run: |
          TAG=${GITHUB_REF_NAME}
          gcloud run services update praxis-web \
            --image=asia-southeast1-docker.pkg.dev/terrene-care/praxis/praxis-web:${TAG} \
            --project=terrene-care \
            --region=asia-southeast1
