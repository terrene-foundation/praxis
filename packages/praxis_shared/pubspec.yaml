name: praxis_shared
description: Shared code for Praxis desktop and mobile apps — API client, data models, WebSocket service, and auth logic.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.2
  web_socket_channel: ^3.0.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.6.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mockito: ^5.4.5
