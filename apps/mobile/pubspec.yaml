name: praxis_mobile
description: Praxis mobile application for on-the-go CO session monitoring and approval.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  praxis_shared:
    path: ../../packages/praxis_shared
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  flutter_local_notifications: ^18.0.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1
  cached_network_image: ^3.4.1
  logger: ^2.6.2
  cupertino_icons: ^1.0.8
  # Firebase push notifications — uncomment after adding:
  #   Android: android/app/google-services.json
  #   iOS: ios/Runner/GoogleService-Info.plist
  # firebase_core: ^3.0.0
  # firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5

flutter:
  uses-material-design: true
