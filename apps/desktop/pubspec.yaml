name: praxis_desktop
description: Praxis desktop application for CO collaboration management.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  praxis_shared:
    path: ../../packages/praxis_shared
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.4
  window_manager: ^0.4.3
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1
  logger: ^2.6.2
  tray_manager: ^0.2.3
  marionette_flutter: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.png
